<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Carter Moore</title>

<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    font-family: 'Segoe UI', sans-serif;
}

/* Background */
body {
    background: url("CMS BG.png") no-repeat center center/cover;
    height: 100vh;
    color: white;
}

/* Dark overlay */
.overlay {
    background: rgba(0, 0, 0, 0.6);
    height: 100%;
    width: 100%;
    display: flex;
    flex-direction: column;
}

/* Navbar */
.navbar {
    display: flex;
    justify-content: space-between;
    padding: 20px 50px;
}

.navbar h1 {
    font-size: 1.5rem;
}

.navbar a {
    color: white;
    text-decoration: none;
    margin-left: 20px;
    font-size: 0.9rem;
}

/* Hero Section */
.hero {
    flex: 1;
    display: flex;
    justify-content: center;
    align-items: center;
    text-align: center;
    padding: 20px;
}

.hero-content {
    max-width: 700px;
}

.hero h2 {
    font-size: 2.8rem;
    margin-bottom: 10px;
}

.hero p {
    color: #ccc;
    margin-bottom: 20px;
    line-height: 1.5;
}

/* Buttons */
.buttons a {
    text-decoration: none;
    padding: 12px 20px;
    border-radius: 8px;
    margin: 5px;
    display: inline-block;
    font-size: 0.9rem;
}

.btn-primary {
    background: #ff7a00;
    color: white;
}

.btn-secondary {
    border: 1px solid white;
    color: white;
}

/* Footer */
.footer {
    text-align: center;
    padding: 15px;
    font-size: 0.8rem;
    color: #aaa;
}
</style>

</head>

<body>

<div class="overlay">

    <!-- Navbar -->
    <div class="navbar">
        <h1>Carter (csrter555)</h1>
        <div>
            <a href="#">Home</a>
            <a href="#">Portfolio</a>
            <a href="#">Contact</a>
        </div>
    </div>

    <!-- Hero -->
    <div class="hero">
        <div class="hero-content">
            <h2>Innovative. Delicate. Modern.</h2>
            <p>
                Work you'd pay millions for — at a price so affordable you'll double take.
                Developer, Designer, and Systems Builder specializing in bots, APIs, and UI/UX.
            </p>

            <div class="buttons">
                <a href="mailto:carter.business.est@gmail.com" class="btn-primary">Hire Me</a>
                <a href="#" class="btn-secondary">View Work</a>
            </div>
        </div>
    </div>

    <!-- Footer -->
    <div class="footer">
        © 2026 Carter Moore — All Rights Reserved
    </div>

</div>

</body>
</html>
